<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Weather App</title>

    <style>

        body{
            margin:0;
            height:100vh;
            font-family:Arial, Helvetica, sans-serif;

            background:linear-gradient(135deg,#4facfe,#00f2fe);

            display:flex;
            justify-content:center;
            align-items:center;
        }


        .container{
            background:white;
            padding:40px;
            border-radius:15px;
            width:350px;
            background:rgba(255,255,255,0.9);
            box-shadow:0 10px 30px rgba(0,0,0,0.2);

            text-align:center;
        }

        h1{
            margin-top:0;
        }

        input{
            width:100%;
            padding:12px;

            border-radius:8px;
            border:1px solid #ddd;

            font-size:16px;
        }

        button{
            margin-top:10px;
            width:100%;

            padding:12px;

            border:none;
            border-radius:8px;

            background:#4facfe;
            color:white;

            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#3a8ee6;
        }

        .weather{
            margin-top:25px;
        }

        .temp{
            font-size:40px;
            font-weight:bold;
        }

        .desc{
            color:#555;
            margin-bottom:15px;
        }

        .data{
            text-align:left;
        }

        .weather img{
            width:80px;
        }

    </style>
</head>

<body>


<div class="container">

    <h1>Погода сейчас</h1>

    <form method="GET">

        <input type="text" name="city" placeholder="Введите город">

        <button type="submit">Узнать погоду</button>

    </form>

    {{if .}}

    <div class="weather">

        <h2>{{.Weather.Name}}</h2>

        <img src="https://openweathermap.org/img/wn/{{(index .Weather.WeatherSky 0).Icon}}@2x.png">

        <div class="temp">
            {{printf "%.1f" .Weather.Main.Temp}}°C
        </div>

        <div class="desc">
            {{(index .Weather.WeatherSky 0).Description}}
        </div>

        <div class="data">

            <p>Ощущается: {{printf "%.1f" .Weather.Main.FeelsLike}}°C</p>

            <p>Влажность: {{.Weather.Main.Humidity}}%</p>

            <p>Давление: {{.Weather.Main.Pressure}} hPa</p>

        </div>

    </div>

    {{end}}

</div>

</body>
</html>
